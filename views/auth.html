<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In/Up Form</title>
    <link rel="stylesheet" href="/css/auth.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <h2 class="logo">Moozik</h2>
      <nav class="navigation">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/chat/lobby">Chat</a>
        <a href="/auth">Signup</a>
      </nav>
    </header>
    <div class="container" id="container">
      <div class="form-container sign-up-container">
        <form action="#" id="signUpForm">
          <h1>Create Account</h1>
          <input type="text" placeholder="Username" id="signup-name" />
          <input type="email" placeholder="Email" id="signup-email" />
          <input type="password" placeholder="Password" id="signup-password"/>
          <button type="submit">Sign Up</button>
          <div id="signUpAlert" class="form-alert" hidden></div>
        </form>
      </div>
      <div class="form-container sign-in-container">
        <form action="#" id="signInForm">
          <h1>Sign in</h1>
          <input type="email" placeholder="Email" id="signin-email" />
          <input type="password" placeholder="Password" id="signin-password"/>
          <button type="submit">Sign In</button>
          <div id="signInAlert" class="form-alert" hidden></div>
        </form>
      </div>
      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <h1>Welcome Back!</h1>
            <p>
              To keep connected with us please login with your personal info
            </p>
            <button class="ghost" id="signIn">Sign In</button>
          </div>
          <div class="overlay-panel overlay-right">
            <h1>Hello, Friend!</h1>
            <p>Enter your personal details and start journey with us</p>
            <button class="ghost" id="signUp">Sign Up</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const signUpButton = document.getElementById("signUp");
      const signInButton = document.getElementById("signIn");
      const container = document.getElementById("container");

      signUpButton.addEventListener("click", () => {
        container.classList.add("right-panel-active");
      });

      signInButton.addEventListener("click", () => {
        container.classList.remove("right-panel-active");
      });
    </script>
    <script src="/js/auth.js"></script>
  </body>
</html>
